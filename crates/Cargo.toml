[workspace]
resolver = "3"
members = [
    "vz",
    "vz-sandbox",
    "vz-cli",
    "vz-guest-agent",
    "vz-image",
    "vz-linux",
    "vz-oci",
    "vz-oci-macos",
    "vz-linux-native",
    "vz-runtime-contract",
    "vz-stack",
    "vz-validation",
]

[workspace.package]
edition = "2024"
rust-version = "1.85.0"
license = "MIT OR Apache-2.0"
repository = "https://github.com/jameslal/vz"

[workspace.dependencies]
# FFI — objc2-virtualization provides auto-generated bindings to all
# Virtualization.framework classes, eliminating the need for a custom vz-sys crate.
objc2 = "0.6"
objc2-foundation = { version = "0.3", features = ["NSObject", "NSString", "NSError", "NSURL", "NSArray", "NSData", "NSProgress", "NSFileHandle"] }
objc2-virtualization = { version = "0.3", features = [
    # Core VM
    "VZVirtualMachine",
    "VZVirtualMachineConfiguration",
    "VZVirtualMachineDelegate",
    "VZVirtualMachineStartOptions",
    "VZMacOSVirtualMachineStartOptions",

    # Boot and platform (parent class features required by child classes)
    "VZBootLoader",
    "VZMacOSBootLoader",
    "VZLinuxBootLoader",
    "VZPlatformConfiguration",
    "VZMacPlatformConfiguration",
    "VZGenericPlatformConfiguration",
    "VZMacOSRestoreImage",
    "VZMacOSInstaller",
    "VZMacHardwareModel",
    "VZMacMachineIdentifier",
    "VZMacAuxiliaryStorage",
    "VZMacOSConfigurationRequirements",

    # Storage (parent + child features)
    "VZStorageDeviceAttachment",
    "VZStorageDeviceConfiguration",
    "VZDiskImageStorageDeviceAttachment",
    "VZVirtioBlockDeviceConfiguration",

    # Shared filesystem (VirtioFS)
    "VZDirectorySharingDeviceConfiguration",
    "VZVirtioFileSystemDeviceConfiguration",
    "VZDirectoryShare",
    "VZSharedDirectory",
    "VZMultipleDirectoryShare",
    "VZSingleDirectoryShare",

    # Vsock
    "VZSocketDevice",
    "VZSocketDeviceConfiguration",
    "VZVirtioSocketDeviceConfiguration",
    "VZVirtioSocketDevice",
    "VZVirtioSocketConnection",
    "VZVirtioSocketListener",

    # Serial console logging
    "VZSerialPortAttachment",
    "VZFileHandleSerialPortAttachment",
    "VZSerialPortConfiguration",
    "VZVirtioConsoleDeviceSerialPortConfiguration",

    # Network (parent + child features)
    "VZNetworkDeviceAttachment",
    "VZNetworkDeviceConfiguration",
    "VZNATNetworkDeviceAttachment",
    "VZVirtioNetworkDeviceConfiguration",

    # Display
    "VZGraphicsDeviceConfiguration",
    "VZMacGraphicsDeviceConfiguration",
    "VZMacGraphicsDisplayConfiguration",
    "VZVirtualMachineView",

    # Block and dispatch interop
    "block2",
    "dispatch2",
] }
objc2-app-kit = { version = "0.3", features = [
    "NSApplication",
    "NSResponder",
    "NSWindow",
    "NSView",
    "NSRunningApplication",
    "NSGraphics",
] }
block2 = "0.6"
dispatch2 = { version = "0.3", features = ["alloc", "objc2"] }

# Async
tokio = { version = "1", features = ["full"] }

# Error handling
thiserror = "2"
anyhow = "1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yml = "0.0.12"
base64 = "0.22"
sha2 = "0.10"

# CLI
clap = { version = "4", features = ["derive"] }

# Shell parsing
shell-words = "1"

# System
libc = "0.2"

# Signal handling
ctrlc = "3"

# HTTP / Download
reqwest = { version = "0.12", features = ["stream"] }
tokio-stream = "0.1"
oci-distribution = "0.11"
oci-spec = "0.9"
docker_credential = "1"

# Progress UI
indicatif = "0.17"

# Testing
tempfile = "3"

# Internal crates
vz = { path = "vz" }
vz-image = { path = "vz-image" }
vz-sandbox = { path = "vz-sandbox" }
vz-linux = { path = "vz-linux" }
vz-linux-native = { path = "vz-linux-native" }
vz-oci = { path = "vz-oci" }
vz-oci-macos = { path = "vz-oci-macos" }
vz-runtime-contract = { path = "vz-runtime-contract" }
vz-stack = { path = "vz-stack" }
vz-validation = { path = "vz-validation" }

[workspace.lints.rust]
unsafe_code = "warn"

[workspace.lints.clippy]
unwrap_used = "deny"
expect_used = "warn"
print_stdout = "warn"
print_stderr = "warn"
