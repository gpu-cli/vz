// Runtime V2 gRPC service definitions for the vz control plane.
//
// Nine service groups covering the full runtime API:
//   - SandboxService:    sandbox lifecycle (create, get, list, terminate)
//   - LeaseService:      lease management (open, heartbeat, close)
//   - ContainerService:  container lifecycle (create, get, list, remove)
//   - ExecutionService:  exec lifecycle (create, stream, cancel, pty, signal)
//   - CheckpointService: checkpoint/restore/portability
//   - BuildService:      image builds (start, stream events, cancel)
//   - EventService:      event log (list, stream)
//   - FileService:       scoped sandbox filesystem primitives
//   - CapabilityService: runtime capabilities discovery
//
// Separate from agent.proto (which is guest-agent communication over vsock).

syntax = "proto3";

package vz.runtime.v2;

// ── Shared request metadata ────────────────────────────────────────

message RequestMetadata {
  // Correlated request identifier.
  string request_id = 1;
  // Idempotency key for retry-safe mutation calls.
  string idempotency_key = 2;
  // Distributed trace identifier.
  string trace_id = 3;
}

// ── Error envelope ─────────────────────────────────────────────────

message ErrorDetail {
  string code = 1;
  string message = 2;
  string request_id = 3;
}

// ── 1. SandboxService ──────────────────────────────────────────────

service SandboxService {
  rpc CreateSandbox(CreateSandboxRequest) returns (stream CreateSandboxEvent);
  rpc PrepareSpaceCache(PrepareSpaceCacheRequest) returns (stream PrepareSpaceCacheEvent);
  rpc ExportSpaceCache(ExportSpaceCacheRequest) returns (stream ExportSpaceCacheEvent);
  rpc ImportSpaceCache(ImportSpaceCacheRequest) returns (stream ImportSpaceCacheEvent);
  rpc GetSandbox(GetSandboxRequest) returns (SandboxResponse);
  rpc ListSandboxes(ListSandboxesRequest) returns (ListSandboxesResponse);
  rpc TerminateSandbox(TerminateSandboxRequest) returns (stream TerminateSandboxEvent);
  rpc OpenSandboxShell(OpenSandboxShellRequest) returns (stream OpenSandboxShellEvent);
  rpc CloseSandboxShell(CloseSandboxShellRequest) returns (stream CloseSandboxShellEvent);
}

message CreateSandboxRequest {
  RequestMetadata metadata = 1;
  string stack_name = 2;
  uint32 cpus = 3;
  uint64 memory_mb = 4;
  map<string, string> labels = 5;
}

message SandboxPayload {
  string sandbox_id = 1;
  string backend = 2;
  string state = 3;
  uint32 cpus = 4;
  uint64 memory_mb = 5;
  uint64 created_at = 6;
  uint64 updated_at = 7;
  map<string, string> labels = 8;
}

message SandboxResponse {
  string request_id = 1;
  SandboxPayload sandbox = 2;
}

message GetSandboxRequest {
  string sandbox_id = 1;
  RequestMetadata metadata = 2;
}

message ListSandboxesRequest {
  RequestMetadata metadata = 1;
}

message ListSandboxesResponse {
  string request_id = 1;
  repeated SandboxPayload sandboxes = 2;
}

message TerminateSandboxRequest {
  string sandbox_id = 1;
  RequestMetadata metadata = 2;
}

message OpenSandboxShellRequest {
  string sandbox_id = 1;
  RequestMetadata metadata = 2;
}

message OpenSandboxShellResponse {
  string request_id = 1;
  string sandbox_id = 2;
  string container_id = 3;
  repeated string cmd = 4;
  repeated string args = 5;
  string execution_id = 6;
}

message CloseSandboxShellRequest {
  string sandbox_id = 1;
  string execution_id = 2;
  RequestMetadata metadata = 3;
}

message CloseSandboxShellResponse {
  string request_id = 1;
  string sandbox_id = 2;
  string execution_id = 3;
}

message SandboxShellProgress {
  string phase = 1;
  string detail = 2;
}

message OpenSandboxShellEvent {
  string request_id = 1;
  uint64 sequence = 2;
  oneof payload {
    SandboxShellProgress progress = 3;
    OpenSandboxShellResponse completion = 4;
  }
}

message CloseSandboxShellEvent {
  string request_id = 1;
  uint64 sequence = 2;
  oneof payload {
    SandboxShellProgress progress = 3;
    CloseSandboxShellResponse completion = 4;
  }
}

message SandboxLifecycleProgress {
  string phase = 1;
  string detail = 2;
}

message CreateSandboxCompletion {
  SandboxResponse response = 1;
  string receipt_id = 2;
}

message CreateSandboxEvent {
  string request_id = 1;
  uint64 sequence = 2;
  oneof payload {
    SandboxLifecycleProgress progress = 3;
    CreateSandboxCompletion completion = 4;
  }
}

message SpaceCacheKeyPayload {
  uint32 schema_version = 1;
  string cache_name = 2;
  string digest_hex = 3;
  string canonical_json = 4;
}

enum SpaceCacheTrustOutcome {
  SPACE_CACHE_TRUST_OUTCOME_UNSPECIFIED = 0;
  SPACE_CACHE_TRUST_OUTCOME_LOCAL_HIT = 1;
  SPACE_CACHE_TRUST_OUTCOME_LOCAL_MISS_COLD = 2;
  SPACE_CACHE_TRUST_OUTCOME_LOCAL_MISS_DIMENSION_CHANGE = 3;
  SPACE_CACHE_TRUST_OUTCOME_LOCAL_MISS_SCHEMA_MISMATCH = 4;
  SPACE_CACHE_TRUST_OUTCOME_REMOTE_VERIFIED_MATERIALIZED = 5;
  SPACE_CACHE_TRUST_OUTCOME_REMOTE_MISS_UNTRUSTED = 6;
}

message SpaceCacheOutcomePayload {
  string cache_name = 1;
  string digest_hex = 2;
  SpaceCacheTrustOutcome outcome = 3;
  string detail = 4;
}

message PrepareSpaceCacheRequest {
  RequestMetadata metadata = 1;
  repeated SpaceCacheKeyPayload keys = 2;
}

message PrepareSpaceCacheProgress {
  string phase = 1;
  string detail = 2;
}

message PrepareSpaceCacheCompletion {
  string request_id = 1;
  repeated SpaceCacheOutcomePayload outcomes = 2;
  string receipt_id = 3;
}

message PrepareSpaceCacheEvent {
  string request_id = 1;
  uint64 sequence = 2;
  oneof payload {
    PrepareSpaceCacheProgress progress = 3;
    PrepareSpaceCacheCompletion completion = 4;
  }
}

message ExportSpaceCacheRequest {
  string cache_name = 1;
  string digest_hex = 2;
  string stream_path = 3;
  RequestMetadata metadata = 4;
}

message ImportSpaceCacheRequest {
  string cache_name = 1;
  string digest_hex = 2;
  string stream_path = 3;
  RequestMetadata metadata = 4;
}

message SpaceCachePortabilityProgress {
  string phase = 1;
  string detail = 2;
}

message ExportSpaceCacheCompletion {
  string cache_name = 1;
  string digest_hex = 2;
  string stream_path = 3;
}

message ImportSpaceCacheCompletion {
  string cache_name = 1;
  string digest_hex = 2;
  string received_subvolume_path = 3;
  string receipt_id = 4;
}

message ExportSpaceCacheEvent {
  string request_id = 1;
  uint64 sequence = 2;
  oneof payload {
    SpaceCachePortabilityProgress progress = 3;
    ExportSpaceCacheCompletion completion = 4;
  }
}

message ImportSpaceCacheEvent {
  string request_id = 1;
  uint64 sequence = 2;
  oneof payload {
    SpaceCachePortabilityProgress progress = 3;
    ImportSpaceCacheCompletion completion = 4;
  }
}

message TerminateSandboxCompletion {
  SandboxResponse response = 1;
  string receipt_id = 2;
}

message TerminateSandboxEvent {
  string request_id = 1;
  uint64 sequence = 2;
  oneof payload {
    SandboxLifecycleProgress progress = 3;
    TerminateSandboxCompletion completion = 4;
  }
}

// ── 2. LeaseService ────────────────────────────────────────────────

service LinuxVmService {
  rpc ValidateLinuxVm(ValidateLinuxVmRequest) returns (stream ValidateLinuxVmEvent);
}

message ValidateLinuxVmRequest {
  RequestMetadata metadata = 1;
  string descriptor_path = 2;
  string sandbox_id = 3;
}

message LinuxVmValidationProgress {
  string phase = 1;
  string detail = 2;
}

message LinuxVmValidationCheck {
  string name = 1;
  string status = 2;
  string detail = 3;
}

message ValidateLinuxVmCompletion {
  string descriptor_path = 1;
  string daemon_backend = 2;
  bool ok = 3;
  repeated LinuxVmValidationCheck checks = 4;
}

message ValidateLinuxVmEvent {
  string request_id = 1;
  uint64 sequence = 2;
  oneof payload {
    LinuxVmValidationProgress progress = 3;
    ValidateLinuxVmCompletion completion = 4;
  }
}

// ── 2. LeaseService ────────────────────────────────────────────────

service LeaseService {
  rpc OpenLease(OpenLeaseRequest) returns (LeaseResponse);
  rpc GetLease(GetLeaseRequest) returns (LeaseResponse);
  rpc ListLeases(ListLeasesRequest) returns (ListLeasesResponse);
  rpc HeartbeatLease(HeartbeatLeaseRequest) returns (LeaseResponse);
  rpc CloseLease(CloseLeaseRequest) returns (LeaseResponse);
}

message OpenLeaseRequest {
  RequestMetadata metadata = 1;
  string sandbox_id = 2;
  uint64 ttl_secs = 3;
}

message LeasePayload {
  string lease_id = 1;
  string sandbox_id = 2;
  uint64 ttl_secs = 3;
  uint64 last_heartbeat_at = 4;
  string state = 5;
}

message LeaseResponse {
  string request_id = 1;
  LeasePayload lease = 2;
}

message GetLeaseRequest {
  string lease_id = 1;
  RequestMetadata metadata = 2;
}

message ListLeasesRequest {
  RequestMetadata metadata = 1;
}

message ListLeasesResponse {
  string request_id = 1;
  repeated LeasePayload leases = 2;
}

message HeartbeatLeaseRequest {
  string lease_id = 1;
  RequestMetadata metadata = 2;
}

message CloseLeaseRequest {
  string lease_id = 1;
  RequestMetadata metadata = 2;
}

// ── 3. ContainerService ────────────────────────────────────────────

service ContainerService {
  rpc CreateContainer(CreateContainerRequest) returns (ContainerResponse);
  rpc GetContainer(GetContainerRequest) returns (ContainerResponse);
  rpc ListContainers(ListContainersRequest) returns (ListContainersResponse);
  rpc RemoveContainer(RemoveContainerRequest) returns (ContainerResponse);
}

message CreateContainerRequest {
  RequestMetadata metadata = 1;
  string sandbox_id = 2;
  string image_digest = 3;
  repeated string cmd = 4;
  map<string, string> env = 5;
  string cwd = 6;
  string user = 7;
}

message ContainerPayload {
  string container_id = 1;
  string sandbox_id = 2;
  string image_digest = 3;
  string state = 4;
  uint64 created_at = 5;
  uint64 started_at = 6;
  uint64 ended_at = 7;
}

message ContainerResponse {
  string request_id = 1;
  ContainerPayload container = 2;
}

message GetContainerRequest {
  string container_id = 1;
  RequestMetadata metadata = 2;
}

message ListContainersRequest {
  RequestMetadata metadata = 1;
}

message ListContainersResponse {
  string request_id = 1;
  repeated ContainerPayload containers = 2;
}

message RemoveContainerRequest {
  string container_id = 1;
  RequestMetadata metadata = 2;
}

// ── 3b. ImageService ──────────────────────────────────────────────

service ImageService {
  rpc GetImage(GetImageRequest) returns (ImageResponse);
  rpc ListImages(ListImagesRequest) returns (ListImagesResponse);
  rpc PullImage(PullImageRequest) returns (stream PullImageEvent);
  rpc PruneImages(PruneImagesRequest) returns (stream PruneImagesEvent);
}

message ImagePayload {
  string image_ref = 1;
  string resolved_digest = 2;
  string platform = 3;
  string source_registry = 4;
  uint64 pulled_at = 5;
}

message ImageResponse {
  string request_id = 1;
  ImagePayload image = 2;
}

message GetImageRequest {
  string image_ref = 1;
  RequestMetadata metadata = 2;
}

message ListImagesRequest {
  RequestMetadata metadata = 1;
}

message ListImagesResponse {
  string request_id = 1;
  repeated ImagePayload images = 2;
}

message PullImageRequest {
  string image_ref = 1;
  RequestMetadata metadata = 2;
}

message PullImageResponse {
  string request_id = 1;
  ImagePayload image = 2;
  string receipt_id = 3;
}

message PruneImagesRequest {
  RequestMetadata metadata = 1;
}

message PruneImagesResponse {
  string request_id = 1;
  uint64 removed_refs = 2;
  uint64 removed_manifests = 3;
  uint64 removed_configs = 4;
  uint64 removed_layer_dirs = 5;
  uint64 remaining_images = 6;
  string receipt_id = 7;
}

message ImageProgress {
  string phase = 1;
  string detail = 2;
}

message PullImageEvent {
  string request_id = 1;
  uint64 sequence = 2;
  oneof payload {
    ImageProgress progress = 3;
    PullImageResponse completion = 4;
  }
}

message PruneImagesEvent {
  string request_id = 1;
  uint64 sequence = 2;
  oneof payload {
    ImageProgress progress = 3;
    PruneImagesResponse completion = 4;
  }
}

// ── 4. ExecutionService ────────────────────────────────────────────

service ExecutionService {
  rpc CreateExecution(CreateExecutionRequest) returns (ExecutionResponse);
  rpc GetExecution(GetExecutionRequest) returns (ExecutionResponse);
  rpc ListExecutions(ListExecutionsRequest) returns (ListExecutionsResponse);
  rpc CancelExecution(CancelExecutionRequest) returns (ExecutionResponse);
  rpc StreamExecOutput(StreamExecOutputRequest) returns (stream ExecOutputEvent);
  rpc WriteExecStdin(WriteExecStdinRequest) returns (ExecutionResponse);
  rpc ResizeExecPty(ResizeExecPtyRequest) returns (ExecutionResponse);
  rpc SignalExec(SignalExecRequest) returns (ExecutionResponse);
}

message CreateExecutionRequest {
  enum PtyMode {
    // Inherit execution PTY default from workload metadata (for example
    // compose service `tty` settings).
    PTY_MODE_INHERIT = 0;
    // Force PTY allocation.
    PTY_MODE_ENABLED = 1;
    // Force non-PTY execution.
    PTY_MODE_DISABLED = 2;
  }

  reserved 6;
  reserved "pty";

  RequestMetadata metadata = 1;
  string container_id = 2;
  repeated string cmd = 3;
  repeated string args = 4;
  map<string, string> env_override = 5;
  uint64 timeout_secs = 7;
  PtyMode pty_mode = 8;
}

message ExecutionPayload {
  string execution_id = 1;
  string container_id = 2;
  string state = 3;
  int32 exit_code = 4;
  uint64 started_at = 5;
  uint64 ended_at = 6;
}

message ExecutionResponse {
  string request_id = 1;
  ExecutionPayload execution = 2;
}

message GetExecutionRequest {
  string execution_id = 1;
  RequestMetadata metadata = 2;
}

message ListExecutionsRequest {
  RequestMetadata metadata = 1;
}

message ListExecutionsResponse {
  string request_id = 1;
  repeated ExecutionPayload executions = 2;
}

message CancelExecutionRequest {
  string execution_id = 1;
  RequestMetadata metadata = 2;
}

message StreamExecOutputRequest {
  string execution_id = 1;
  RequestMetadata metadata = 2;
}

message WriteExecStdinRequest {
  string execution_id = 1;
  bytes data = 2;
  RequestMetadata metadata = 3;
}

message ExecOutputEvent {
  oneof payload {
    bytes stdout = 1;
    bytes stderr = 2;
    int32 exit_code = 3;
    string error = 4;
  }
  uint64 sequence = 5;
}

message ResizeExecPtyRequest {
  string execution_id = 1;
  uint32 cols = 2;
  uint32 rows = 3;
  RequestMetadata metadata = 4;
}

message SignalExecRequest {
  string execution_id = 1;
  string signal = 2;
  RequestMetadata metadata = 3;
}

// ── 5. CheckpointService ──────────────────────────────────────────

service CheckpointService {
  rpc CreateCheckpoint(CreateCheckpointRequest) returns (CheckpointResponse);
  rpc GetCheckpoint(GetCheckpointRequest) returns (CheckpointResponse);
  rpc ListCheckpoints(ListCheckpointsRequest) returns (ListCheckpointsResponse);
  rpc RestoreCheckpoint(RestoreCheckpointRequest) returns (CheckpointResponse);
  rpc ForkCheckpoint(ForkCheckpointRequest) returns (CheckpointResponse);
  rpc DiffCheckpoints(DiffCheckpointsRequest) returns (DiffCheckpointsResponse);
  rpc ExportCheckpoint(ExportCheckpointRequest) returns (stream ExportCheckpointEvent);
  rpc ImportCheckpoint(ImportCheckpointRequest) returns (stream ImportCheckpointEvent);
}

message CreateCheckpointRequest {
  RequestMetadata metadata = 1;
  string sandbox_id = 2;
  // Checkpoint class: "fs_quick" or "vm_full".
  string checkpoint_class = 3;
  string compatibility_fingerprint = 4;
  // Optional retention tag; tagged checkpoints are protected from policy GC.
  string retention_tag = 5;
}

message CheckpointPayload {
  string checkpoint_id = 1;
  string sandbox_id = 2;
  string parent_checkpoint_id = 3;
  // Checkpoint class: "fs_quick" or "vm_full".
  string checkpoint_class = 4;
  string state = 5;
  string compatibility_fingerprint = 6;
  uint64 created_at = 7;
  // Non-empty when checkpoint is explicitly retained.
  string retention_tag = 8;
  // True when checkpoint is protected from policy GC.
  bool retention_protected = 9;
  // Empty or one of: "age_limit", "count_limit".
  string retention_gc_reason = 10;
  // Age-based expiry for untagged checkpoints; 0 for tagged.
  uint64 retention_expires_at = 11;
}

message CheckpointResponse {
  string request_id = 1;
  CheckpointPayload checkpoint = 2;
}

message GetCheckpointRequest {
  string checkpoint_id = 1;
  RequestMetadata metadata = 2;
}

message ListCheckpointsRequest {
  RequestMetadata metadata = 1;
}

message ListCheckpointsResponse {
  string request_id = 1;
  repeated CheckpointPayload checkpoints = 2;
}

message RestoreCheckpointRequest {
  string checkpoint_id = 1;
  RequestMetadata metadata = 2;
}

message ForkCheckpointRequest {
  string checkpoint_id = 1;
  string new_sandbox_id = 2;
  RequestMetadata metadata = 3;
}

message DiffCheckpointsRequest {
  string from_checkpoint_id = 1;
  string to_checkpoint_id = 2;
  RequestMetadata metadata = 3;
}

message CheckpointFileDiffPayload {
  string path = 1;
  string change = 2;
  string before_digest_sha256 = 3;
  string after_digest_sha256 = 4;
  uint64 before_size = 5;
  uint64 after_size = 6;
}

message DiffCheckpointsResponse {
  string request_id = 1;
  repeated CheckpointFileDiffPayload files = 2;
}

message ExportCheckpointRequest {
  string checkpoint_id = 1;
  string stream_path = 2;
  RequestMetadata metadata = 3;
}

message ExportCheckpointCompletion {
  string checkpoint_id = 1;
  string stream_path = 2;
}

message ImportCheckpointRequest {
  string sandbox_id = 1;
  string stream_path = 2;
  // Checkpoint class: "fs_quick" or "vm_full".
  string checkpoint_class = 3;
  string compatibility_fingerprint = 4;
  // Optional retention tag; tagged checkpoints are protected from policy GC.
  string retention_tag = 5;
  RequestMetadata metadata = 6;
}

message CheckpointMutationProgress {
  string phase = 1;
  string detail = 2;
}

message ImportCheckpointCompletion {
  CheckpointResponse response = 1;
  string receipt_id = 2;
  string received_subvolume_path = 3;
}

message ExportCheckpointEvent {
  string request_id = 1;
  uint64 sequence = 2;
  oneof payload {
    CheckpointMutationProgress progress = 3;
    ExportCheckpointCompletion completion = 4;
  }
}

message ImportCheckpointEvent {
  string request_id = 1;
  uint64 sequence = 2;
  oneof payload {
    CheckpointMutationProgress progress = 3;
    ImportCheckpointCompletion completion = 4;
  }
}

// ── 6. BuildService ───────────────────────────────────────────────

service BuildService {
  rpc StartBuild(StartBuildRequest) returns (BuildResponse);
  rpc GetBuild(GetBuildRequest) returns (BuildResponse);
  rpc ListBuilds(ListBuildsRequest) returns (ListBuildsResponse);
  rpc CancelBuild(CancelBuildRequest) returns (BuildResponse);
  rpc StreamBuildEvents(StreamBuildEventsRequest) returns (stream BuildEvent);
}

message StartBuildRequest {
  RequestMetadata metadata = 1;
  string sandbox_id = 2;
  string context = 3;
  string dockerfile = 4;
  map<string, string> args = 5;
  string target = 6;
  string image_tag = 7;
  repeated string secrets = 8;
  bool no_cache = 9;
  bool push = 10;
  string output_oci_tar_dest = 11;
}

message BuildPayload {
  string build_id = 1;
  string sandbox_id = 2;
  string state = 3;
  string result_digest = 4;
  uint64 started_at = 5;
  uint64 ended_at = 6;
}

message BuildResponse {
  string request_id = 1;
  BuildPayload build = 2;
}

message GetBuildRequest {
  string build_id = 1;
  RequestMetadata metadata = 2;
}

message ListBuildsRequest {
  RequestMetadata metadata = 1;
}

message ListBuildsResponse {
  string request_id = 1;
  repeated BuildPayload builds = 2;
}

message CancelBuildRequest {
  string build_id = 1;
  RequestMetadata metadata = 2;
}

message StreamBuildEventsRequest {
  string build_id = 1;
  RequestMetadata metadata = 2;
}

message BuildEvent {
  string event_type = 1;
  string message = 2;
  uint64 timestamp = 3;
}

// ── 6b. ReceiptService ─────────────────────────────────────────────

service ReceiptService {
  rpc GetReceipt(GetReceiptRequest) returns (ReceiptResponse);
}

message ReceiptPayload {
  string receipt_id = 1;
  string operation = 2;
  string entity_id = 3;
  string entity_type = 4;
  string request_id = 5;
  string status = 6;
  uint64 created_at = 7;
  string metadata_json = 8;
  // Age-based expiry for receipt retention policy.
  uint64 retention_expires_at = 9;
  // Empty or one of: "age_limit", "count_limit".
  string retention_gc_reason = 10;
  // Stable policy identifier for current daemon defaults.
  string retention_policy = 11;
}

message ReceiptResponse {
  string request_id = 1;
  ReceiptPayload receipt = 2;
}

message GetReceiptRequest {
  string receipt_id = 1;
  RequestMetadata metadata = 2;
}

// ── 7. EventService ───────────────────────────────────────────────

service EventService {
  rpc ListEvents(ListEventsRequest) returns (ListEventsResponse);
  rpc StreamEvents(StreamEventsRequest) returns (stream RuntimeEvent);
}

message ListEventsRequest {
  string stack_name = 1;
  int64 after = 2;
  uint32 limit = 3;
  string scope = 4;
  RequestMetadata metadata = 5;
}

message RuntimeEvent {
  int64 id = 1;
  string stack_name = 2;
  string created_at = 3;
  string event_json = 4;
}

message ListEventsResponse {
  string request_id = 1;
  repeated RuntimeEvent events = 2;
  int64 next_cursor = 3;
}

message StreamEventsRequest {
  string stack_name = 1;
  int64 after = 2;
  string scope = 3;
  RequestMetadata metadata = 4;
}

// ── 8. StackService ───────────────────────────────────────────────

service StackService {
  rpc ApplyStack(ApplyStackRequest) returns (stream ApplyStackEvent);
  rpc TeardownStack(TeardownStackRequest) returns (stream TeardownStackEvent);
  rpc GetStackStatus(GetStackStatusRequest) returns (GetStackStatusResponse);
  rpc ListStackEvents(ListStackEventsRequest) returns (ListStackEventsResponse);
  rpc GetStackLogs(GetStackLogsRequest) returns (GetStackLogsResponse);
  rpc StopStackService(StackServiceActionRequest) returns (stream StackServiceActionEvent);
  rpc StartStackService(StackServiceActionRequest) returns (stream StackServiceActionEvent);
  rpc RestartStackService(StackServiceActionRequest) returns (stream StackServiceActionEvent);
  rpc CreateStackRunContainer(StackRunContainerRequest) returns (StackRunContainerResponse);
  rpc RemoveStackRunContainer(StackRunContainerRequest) returns (StackRunContainerResponse);
}

message ApplyStackRequest {
  RequestMetadata metadata = 1;
  string stack_name = 2;
  string compose_yaml = 3;
  string compose_dir = 4;
  bool dry_run = 5;
  bool detach = 6;
}

message StackServiceStatus {
  string service_name = 1;
  string phase = 2;
  bool ready = 3;
  string container_id = 4;
  string last_error = 5;
}

message ApplyStackResponse {
  string request_id = 1;
  string stack_name = 2;
  uint32 changed_actions = 3;
  bool converged = 4;
  uint32 services_ready = 5;
  uint32 services_failed = 6;
  repeated StackServiceStatus services = 7;
}

message StackMutationProgress {
  string phase = 1;
  string detail = 2;
}

message ApplyStackCompletion {
  ApplyStackResponse response = 1;
  string receipt_id = 2;
}

message ApplyStackEvent {
  string request_id = 1;
  uint64 sequence = 2;
  oneof payload {
    StackMutationProgress progress = 3;
    ApplyStackCompletion completion = 4;
  }
}

message TeardownStackRequest {
  RequestMetadata metadata = 1;
  string stack_name = 2;
  bool dry_run = 3;
  bool remove_volumes = 4;
}

message TeardownStackResponse {
  string request_id = 1;
  string stack_name = 2;
  uint32 changed_actions = 3;
  uint32 removed_volumes = 4;
}

message TeardownStackCompletion {
  TeardownStackResponse response = 1;
  string receipt_id = 2;
}

message TeardownStackEvent {
  string request_id = 1;
  uint64 sequence = 2;
  oneof payload {
    StackMutationProgress progress = 3;
    TeardownStackCompletion completion = 4;
  }
}

message GetStackStatusRequest {
  RequestMetadata metadata = 1;
  string stack_name = 2;
}

message GetStackStatusResponse {
  string request_id = 1;
  string stack_name = 2;
  repeated StackServiceStatus services = 3;
}

message ListStackEventsRequest {
  RequestMetadata metadata = 1;
  string stack_name = 2;
  int64 after = 3;
  uint32 limit = 4;
}

message ListStackEventsResponse {
  string request_id = 1;
  repeated RuntimeEvent events = 2;
  int64 next_cursor = 3;
}

message GetStackLogsRequest {
  RequestMetadata metadata = 1;
  string stack_name = 2;
  string service = 3;
  uint32 tail = 4;
}

message StackServiceLog {
  string service_name = 1;
  string output = 2;
}

message GetStackLogsResponse {
  string request_id = 1;
  string stack_name = 2;
  repeated StackServiceLog logs = 3;
}

message StackServiceActionRequest {
  RequestMetadata metadata = 1;
  string stack_name = 2;
  string service_name = 3;
}

message StackServiceActionResponse {
  string request_id = 1;
  string stack_name = 2;
  StackServiceStatus service = 3;
}

message StackServiceActionCompletion {
  StackServiceActionResponse response = 1;
  string receipt_id = 2;
}

message StackServiceActionEvent {
  string request_id = 1;
  uint64 sequence = 2;
  oneof payload {
    StackMutationProgress progress = 3;
    StackServiceActionCompletion completion = 4;
  }
}

message StackRunContainerRequest {
  RequestMetadata metadata = 1;
  string stack_name = 2;
  string service_name = 3;
  string run_service_name = 4;
}

message StackRunContainerResponse {
  string request_id = 1;
  string stack_name = 2;
  string service_name = 3;
  string run_service_name = 4;
  string container_id = 5;
}

// ── 9. FileService ────────────────────────────────────────────────

service FileService {
  rpc ReadFile(ReadFileRequest) returns (ReadFileResponse);
  rpc WriteFile(WriteFileRequest) returns (WriteFileResponse);
  rpc ListFiles(ListFilesRequest) returns (ListFilesResponse);
  rpc MakeDir(MakeDirRequest) returns (FileMutationResponse);
  rpc RemovePath(RemovePathRequest) returns (FileMutationResponse);
  rpc MovePath(MovePathRequest) returns (FileMutationResponse);
  rpc CopyPath(CopyPathRequest) returns (FileMutationResponse);
  rpc ChmodPath(ChmodPathRequest) returns (FileMutationResponse);
  rpc ChownPath(ChownPathRequest) returns (FileMutationResponse);
}

message FileEntry {
  string path = 1;
  bool is_dir = 2;
  uint64 size = 3;
  uint64 modified_at = 4;
}

message ReadFileRequest {
  RequestMetadata metadata = 1;
  string sandbox_id = 2;
  string path = 3;
  uint64 offset = 4;
  uint64 limit = 5;
}

message ReadFileResponse {
  string request_id = 1;
  bytes data = 2;
  bool truncated = 3;
}

message WriteFileRequest {
  RequestMetadata metadata = 1;
  string sandbox_id = 2;
  string path = 3;
  bytes data = 4;
  bool append = 5;
  bool create_parents = 6;
}

message WriteFileResponse {
  string request_id = 1;
  uint64 bytes_written = 2;
}

message ListFilesRequest {
  RequestMetadata metadata = 1;
  string sandbox_id = 2;
  string path = 3;
  bool recursive = 4;
  uint32 limit = 5;
}

message ListFilesResponse {
  string request_id = 1;
  repeated FileEntry entries = 2;
}

message MakeDirRequest {
  RequestMetadata metadata = 1;
  string sandbox_id = 2;
  string path = 3;
  bool parents = 4;
}

message RemovePathRequest {
  RequestMetadata metadata = 1;
  string sandbox_id = 2;
  string path = 3;
  bool recursive = 4;
}

message MovePathRequest {
  RequestMetadata metadata = 1;
  string sandbox_id = 2;
  string src_path = 3;
  string dst_path = 4;
  bool overwrite = 5;
}

message CopyPathRequest {
  RequestMetadata metadata = 1;
  string sandbox_id = 2;
  string src_path = 3;
  string dst_path = 4;
  bool overwrite = 5;
}

message ChmodPathRequest {
  RequestMetadata metadata = 1;
  string sandbox_id = 2;
  string path = 3;
  uint32 mode = 4;
}

message ChownPathRequest {
  RequestMetadata metadata = 1;
  string sandbox_id = 2;
  string path = 3;
  uint32 uid = 4;
  uint32 gid = 5;
}

message FileMutationResponse {
  string request_id = 1;
  string path = 2;
  string status = 3;
}

// ── 10. CapabilityService ─────────────────────────────────────────

service CapabilityService {
  rpc GetCapabilities(GetCapabilitiesRequest) returns (GetCapabilitiesResponse);
}

message GetCapabilitiesRequest {
  RequestMetadata metadata = 1;
}

message Capability {
  string name = 1;
  bool enabled = 2;
}

message GetCapabilitiesResponse {
  string request_id = 1;
  repeated Capability capabilities = 2;
}
